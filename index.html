        function createBooth(num) {
            if (num === null) {
                const div = document.createElement('div');
                div.className = 'spacer';
                return div;
            }
            const ex = exhibitors[num];
            const div = document.createElement('div');
            div.className = `booth ${ex && ex.type === 'Partner' ? 'partner' : ex ? 'aba' : 'empty'}`;
            const shortName = ex ? ex.signName.split(' ').slice(0, 2).join(' ') : '';
            div.innerHTML = `<div class="booth-num">${num}</div><div class="booth-name">${shortName}</div>`;
            div.onclick = () => {
                if (ex) {
                    alert(`Booth ${num}\n\nSign Name: ${ex.signName}\nOrganization: ${ex.org}\nContact: ${ex.rep}\nPhone: ${ex.phone}\nEmail: ${ex.email}\nType: ${ex.type}`);
                } else {
                    alert(`Booth ${num} - Available`);
                }
            };
            return div;
        }

            const layout = [[16,17,46,47,76,77,106,107],[15,18,45,48,75,78,105,108],[14,19,44,49,74,79,104,109],[13,20,43,50,73,80,103,110],[12,21,42,51,72,81,102,111],[11,22,41,52,71,82,101,112],[10,23,40,53,70,83,100,113],[9,null,39,54,69,84,99,114],[8,24,38,55,68,85,98,115],[7,25,37,56,67,86,97,116],[6,26,36,57,66,87,96,117],[5,27,35,58,65,88,95,118],[4,28,34,59,64,89,94,119],[3,29,33,60,63,90,93,120],[2,30,32,61,62,91,92,121],[1,31,null,null,null,null,null,122],[null,null,null,null,null,null,null,123]];
            const container = document.getElementById('layout');
            layout.forEach(rowData => {
                const row = document.createElement('div');
                row.className = 'row';
                rowData.forEach(boothNum => {
                    row.appendChild(createBooth(boothNum));
                });
                container.appendChild(row);
            });
        }
