        function createBooth(num) {
            if (num === null) {
                const div = document.createElement('div');
                div.className = 'spacer';
                return div;
            }
            const ex = exhibitors[num];
            const div = document.createElement('div');
            div.className = `booth ${ex && ex.type === 'Partner' ? 'partner' : ex ? 'aba' : 'empty'}`;
            const shortName = ex ? ex.signName.split(' ').slice(0, 2).join(' ') : '';
            div.innerHTML = `<div class="booth-num">${num}</div><div class="booth-name">${shortName}</div>`;
            div.onclick = () => {
                if (ex) {
                    alert(`Booth ${num}\n\nSign: ${ex.signName}\nOrg: ${ex.org}\nContact: ${ex.rep}\nPhone: ${ex.phone}\nEmail: ${ex.email}`);
                }
            };
            return div;
        }
